<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <!-- Prevent aggressive caching of the entry point -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#c1a274" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Zumra RMS" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <title>Zumra Hotels - RMS</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // FORCE: Unregister ALL service workers on every page load.
      // This ensures users always get the latest code, not stale cached versions.
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(reg) {
            console.log('[SW] Force-unregistering old SW, scope:', reg.scope);
            reg.unregister();
          });
          if (regs.length > 0) {
            caches.keys().then(function(keys) {
              keys.forEach(function(k) { caches.delete(k); });
            });
          }
        });
      }
    </script>
    <script>
      // Stale chunk detection: if a dynamic import fails, auto-reload
      window.addEventListener('unhandledrejection', function(event) {
        var msg = (event.reason && event.reason.message) || String(event.reason);
        if (/failed to fetch dynamically imported module/i.test(msg) ||
            /importing a module script failed/i.test(msg) ||
            /loading chunk/i.test(msg)) {
          event.preventDefault();
          console.warn('[Stale Chunk] Auto-reloading:', msg);
          window.location.reload();
        }
      });
    </script>
    <script>
      // Register PWA service worker with forced update check
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' }).then(function(reg) {
            console.log('[SW] Registered, scope:', reg.scope);
            // Force update check on every page load — prevents stale SW trap
            reg.update();
            // When a new SW is found and installed, reload to activate it
            reg.addEventListener('updatefound', function() {
              var newWorker = reg.installing;
              if (newWorker) {
                newWorker.addEventListener('statechange', function() {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    console.log('[SW] New version available — reloading...');
                    window.location.reload();
                  }
                });
              }
            });
          }).catch(function(err) {
            console.warn('[SW] Registration failed:', err);
          });
        });
      }
    </script>
  </body>
</html>
